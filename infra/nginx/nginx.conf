worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=minio_cache:100m
    max_size=5g
    inactive=24h
    use_temp_path=off;

  upstream minio_upstream {
    server minio:9000;
  }

  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass http://minio_upstream;

      # important: do NOT forward localhost here
      proxy_set_header Host minio:9000;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";

      proxy_http_version 1.1;

      proxy_cache minio_cache;
      proxy_cache_methods GET HEAD;
      proxy_cache_lock on;
      proxy_cache_revalidate on;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504 updating;
      proxy_cache_valid 200 206 301 302 10m;
      proxy_cache_valid 404 1m;

      add_header X-Cache-Status $upstream_cache_status always;
    }
  }
}